name: Deploy

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: dev-music-portfolio
  LAMBDA_FUNCTION_NAME: dev-music-portfolio-fn

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:integration

  sast:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/security-audit

  release:
    needs: [quality, sast]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Webiny config from SSM and Secrets Manager
        run: |
          echo "WEBINY_API_URL=$(aws ssm get-parameter --name /jameswilliams/dev/webiny/api-url --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "WEBINY_API_TOKEN=$(aws secretsmanager get-secret-value --secret-id jameswilliams/dev/webiny/api-token --query SecretString --output text)" >> $GITHUB_ENV

      - name: Fetch Cognito and DynamoDB config from SSM
        run: |
          echo "COGNITO_USER_POOL_ID=$(aws ssm get-parameter --name /jameswilliams/dev/cognito/user-pool-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(aws ssm get-parameter --name /jameswilliams/dev/cognito/client-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "FAN_PREFERENCES_TABLE=$(aws ssm get-parameter --name /jameswilliams/dev/dynamodb/fan-preferences-table --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "FAN_DELETION_AUDIT_TABLE=$(aws ssm get-parameter --name /jameswilliams/dev/dynamodb/fan-deletion-audit-table --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "KMS_KEY_ARN=$(aws ssm get-parameter --name /jameswilliams/dev/kms/fan-data-key-arn --query Parameter.Value --output text)" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          docker build \
            --build-arg WEBINY_API_URL=$WEBINY_API_URL \
            --build-arg WEBINY_API_TOKEN=$WEBINY_API_TOKEN \
            --build-arg COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID \
            --build-arg COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID \
            --build-arg FAN_PREFERENCES_TABLE=$FAN_PREFERENCES_TABLE \
            --build-arg FAN_DELETION_AUDIT_TABLE=$FAN_DELETION_AUDIT_TABLE \
            --build-arg KMS_KEY_ARN=$KMS_KEY_ARN \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          fi

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION_NAME \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION \
            --region $AWS_REGION

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ETW3HJBAXWXZ6 \
            --paths "/*"
